name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npx vite build

      - name: Build backend
        working-directory: backend
        run: |
          npm install
          npx tsc --noEmit || true

      - name: Summary
        shell: bash
        run: echo "Build verified successfully"